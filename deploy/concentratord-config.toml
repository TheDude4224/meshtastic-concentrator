# ChirpStack Concentratord — RAK5146 USB (SX1303) US915
# Validated working config as of 2026-03-01

[concentratord]
  log_level = "INFO"
  log_to_syslog = false
  stats_interval = "30s"

  [concentratord.api]
    event_bind = "ipc:///tmp/concentratord_event"
    command_bind = "ipc:///tmp/concentratord_command"

[gateway]
  antenna_gain = 0
  lorawan_public = false
  region = "US915"
  model = "rak_5146"
  model_flags = ["USB"]
  gateway_id = ""

  [gateway.location]
    latitude = 0.0
    longitude = 0.0
    altitude = 0

  # US915 sub-band 2 — Meshtastic LongFast channels (903.9 - 905.3 MHz)
  [gateway.concentrator]
    multi_sf_channels = [
      903900000,
      904100000,
      904300000,
      904500000,
      904700000,
      904900000,
      905100000,
      905300000,
    ]

    [gateway.concentrator.lora_std]
      frequency = 904600000
      bandwidth = 500000
      spreading_factor = 8

    [gateway.concentrator.fsk]
      frequency = 904800000
      bandwidth = 250000
      datarate = 50000
